{% set name = "julearn" %}
{% set version = "0.3.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/julearn-{{ version }}.tar.gz
  sha256: 6a32f4c80216f57b2f6a1cb8041521bb0877baec0294f87bfdf536aa8500e599

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=61.0.0
    - wheel
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - numpy >=1.24,<1.27
    - pandas >=1.5.0,<2.3
    - scikit-learn >=1.2.0,<1.6.0
    - statsmodels >=0.13,<0.15
    - panel >=1.3.0
    - bokeh >=3.0.0
    - param >=2.0.0
    - scikit-optimize >=0.10.0,<0.11
    - optuna >=3.6.0,<3.7
    - optuna-integration >=3.6.0,<4.1

test:
  imports:
    - julearn
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/juaml/julearn
  summary: Juelich Machine Learning Library
  license: AGPL-3.0-only
  license_file: LICENSE.md
  doc_url: https://juaml.github.io/julearn/main/index.html
  dev_url: https://github.com/juaml/julearn

extra:
  recipe-maintainers:
    - synchon
